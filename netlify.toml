[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[edge_functions]]
  function = "billing-country"
  path = "/api/billing-country"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' https://cdn.paddle.com; connect-src 'self' https://bbwbxmnanccwottrmkqu.supabase.co wss://bbwbxmnanccwottrmkqu.supabase.co https://sandbox-api.paddle.com https://api.paddle.com https://checkout-service.paddle.com https://sandbox-checkout-service.paddle.com; frame-src https://checkout.paddle.com https://sandbox-checkout.paddle.com; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
